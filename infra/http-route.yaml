# Routes the feature Gateway to the controller (data plane: launch, status, pi,
# kill-worker, clear, and the standalone UI). Filter-free; all refs are
# namespace-relative so the Hub's namespace rewrite stays consistent.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jobset-route
  namespace: ${NAMESPACE}
spec:
  parentRefs:
    - name: jobset-gw
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: jobset-controller
          port: 80
