# Spot CPU ComputeClass for the JobSet leader + worker pods. Cluster-scoped: a
# ComputeClass found here (or even under infra/) is routed to the cluster-scoped
# API by the Hub. The JobSet pods select it via nodeSelector
# cloud.google.com/compute-class: jobset-cpu, so GKE Node Auto-Provisioning grows
# the cluster onto cheap, preemptible Spot CPU capacity on demand and scales it
# back to zero when the JobSet finishes. CPU-only — the Monte Carlo workload is
# pure CPU.
apiVersion: cloud.google.com/v1
kind: ComputeClass
metadata:
  name: jobset-cpu
spec:
  priorities:
    - machineFamily: n2
      spot: true
    - machineFamily: n2d
      spot: true
    - machineFamily: e2
      spot: true
  # Let GKE create Spot node pools on demand and scale them back to zero.
  nodePoolAutoCreation:
    enabled: true
  # Prefer waiting for Spot rather than silently falling back to on-demand.
  whenUnsatisfiable: ScaleUpAnyway
  activeMigration:
    optimizeRulePriority: true
